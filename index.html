<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miku Nakano Clicker</title>
    <style>
        :root {
            --miku-blue: #4a90e2;
            --miku-light-blue: #a3c9f1;
            --miku-dark: #2c3e50;
            --miku-pink: #ffb6c1;
            --miku-purple: #8b5cf6;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e0f2fe, #bae6fd);
            color: var(--miku-dark);
            display: flex;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        /* Left Column: Clicking Area */
        .clicker-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-right: 4px solid var(--miku-blue);
            position: relative;
            overflow: hidden;
        }

        .video-bg {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            transform: translate(-50%, -50%);
            object-fit: cover;
            z-index: 1;
        }

        .clicker-content {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }

        .score-display {
            text-align: center;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.85);
            padding: 15px 30px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            border: 2px solid white;
        }

        .score-display h1 {
            font-size: 2.5rem;
            margin: 0;
            color: var(--miku-dark);
        }

        .score-display p {
            font-size: 1.2rem;
            margin: 5px 0 0 0;
            color: #475569;
            font-weight: 600;
        }

        .prestige-display {
            font-size: 0.95rem;
            color: var(--miku-purple);
            margin-top: 5px;
            font-weight: bold;
        }

        .miku-clicker {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            background-color: var(--miku-blue);
            border: 8px solid white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            cursor: pointer;
            transition: transform 0.05s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: transparent; 
            background-image: url('assets/miku-avatar.png'); 
            background-size: cover;     
            background-position: center; 
        }

        .miku-clicker:active {
            transform: scale(0.95);
        }

        .floating-text {
            position: absolute;
            color: #0284c7;
            font-weight: 900;
            font-size: 1.75rem;
            pointer-events: none;
            animation: floatUp 0.8s ease-out forwards;
            text-shadow: 2px 2px 0px white;
            z-index: 10;
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-120px) scale(0.8); }
        }

        /* Right Column: Shop Area */
        .shop-section {
            width: 400px;
            background: white;
            display: flex;
            flex-direction: column;
            box-shadow: -5px 0 15px rgba(0,0,0,0.05);
            z-index: 3; 
        }

        .shop-header {
            background-color: var(--miku-blue);
            color: white;
            padding: 20px;
            text-align: center;
            margin: 0;
        }

        .shop-items {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .shop-item {
            display: flex;
            align-items: center;
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .shop-item:hover {
            border-color: var(--miku-blue);
            background: #f0f7ff;
        }

        .shop-item.disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: #f1f5f9;
            border-color: #e2e8f0;
        }

        .item-icon {
            width: 50px;
            height: 50px;
            background-color: var(--miku-light-blue);
            border-radius: 8px;
            margin-right: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .item-details { flex: 1; }
        .item-name { font-weight: bold; font-size: 1.1rem; margin-bottom: 2px; }
        .item-effect { font-size: 0.85rem; color: #64748b; }
        .item-cost { font-weight: bold; color: #22c55e; }
        .item-count { font-size: 1.5rem; font-weight: bold; color: var(--miku-blue); margin-left: 15px; min-width: 30px; text-align: right; }

        /* Cloud Sync Panel Styling */
        .cloud-panel {
            background: #f1f5f9;
            border: 2px dashed #cbd5e1;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .cloud-input {
            width: calc(100% - 16px);
            padding: 6px;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
            font-size: 0.85rem;
        }
        .cloud-buttons {
            display: flex;
            gap: 5px;
        }
        .btn-cloud {
            flex: 1;
            background: var(--miku-blue);
            color: white;
            border: none;
            padding: 6px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .btn-cloud:hover { background: #357abd; }

        .shop-footer {
            padding: 15px;
            border-top: 2px solid #e2e8f0;
            background: #f8fafc;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .footer-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-reset {
            background-color: #ef4444;
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.85rem;
            transition: background 0.2s;
        }
        .btn-reset:hover { background-color: #dc2626; }

        .btn-prestige {
            background-color: var(--miku-purple);
            color: white;
            border: none;
            padding: 10px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.95rem;
            transition: all 0.2s;
            width: 100%;
            box-shadow: 0 4px 6px rgba(139, 92, 246, 0.2);
        }

        .btn-prestige:hover:not(.disabled) {
            background-color: #7c3aed;
            transform: translateY(-1px);
        }

        .btn-prestige.disabled {
            background-color: #cbd5e1;
            color: #94a3b8;
            cursor: not-allowed;
            box-shadow: none;
        }

        .save-indicator {
            font-size: 0.85rem;
            color: #64748b;
            font-style: italic;
            opacity: 0;
            transition: opacity 0.3s;
        }
    </style>
</head>
<body>

    <div class="clicker-section">
        <video class="video-bg" autoplay muted loop playsinline>
            <source src="https://motionbgs.com/media/4553/miku-nakano.960x540.mp4" type="video/mp4">
        </video>

        <div class="clicker-content" id="click-area">
            <div class="score-display">
                <h1 id="soda-count">0 Matchas</h1>
                <p id="sps-count">0 per second</p>
                <div class="prestige-display" id="ep-count">Exam Points: 0 (+0% Global Boost)</div>
            </div>
            <div class="miku-clicker" id="miku-btn"></div>
        </div>
    </div>

    <div class="shop-section">
        <h2 class="shop-header">Miku's Study Corner</h2>
        <div class="shop-items" id="shop-container">
            <!-- Cloud Sync Submenu inside shop -->
            <div class="cloud-panel">
                <div style="font-size: 0.85rem; font-weight: bold; color: var(--miku-dark);">🌐 Cross-Device Sync Profile</div>
                <input type="text" class="cloud-input" id="cloud-username" placeholder="Create or Enter a unique username...">
                <div class="cloud-buttons">
                    <button class="btn-cloud" onclick="cloudSave()">Save to Cloud</button>
                    <button class="btn-cloud" onclick="cloudLoad()">Load from Cloud</button>
                </div>
            </div>
            <div id="actual-items"></div>
        </div>
        
        <div class="shop-footer">
            <button class="btn-prestige disabled" id="prestige-btn" onclick="prestigeGame()">
                Take Exam (Requires 25k Matchas)
            </button>
            <div class="footer-row">
                <span class="save-indicator" id="save-status">Progress Saved!</span>
                <button class="btn-reset" onclick="resetGame()">Reset Progress</button>
            </div>
        </div>
    </div>

    <script>
        let gameData = { sodas: 0, totalSodasClicked: 0, sodasPerSecond: 0, examPoints: 0 };

        const upgrades = [
            { id: 'headphones', name: 'Miku\'s Headphones', cost: 15, baseCost: 15, sps: 0.1, count: 0, icon: '🎧', image: 'assets/headphones.jpg', zoom: '150%' },
            { id: 'recipe', name: 'Matcha Recipe Book', cost: 100, baseCost: 100, sps: 1, count: 0, icon: '📚', image: 'assets/recipe-book.png', zoom: '80%' },
            { id: 'documentary', name: 'Sengoku Documentary', cost: 1100, baseCost: 1100, sps: 8, count: 0, icon: '📺', image: 'assets/documentary.png' },
            { id: 'tutor', name: 'Private Tutor (Fuutarou)', cost: 12000, baseCost: 12000, sps: 47, count: 0, icon: '👨‍🏫', image: 'assets/tutor.png' }
        ];

        const sodaCountEl = document.getElementById('soda-count');
        const spsCountEl = document.getElementById('sps-count');
        const epCountEl = document.getElementById('ep-count');
        const mikuBtn = document.getElementById('miku-btn');
        const clickArea = document.getElementById('click-area');
        const shopContainer = document.getElementById('actual-items');
        const saveStatusEl = document.getElementById('save-status');
        const prestigeBtn = document.getElementById('prestige-btn');

        function init() {
            loadGame();
            renderShop();
            updateUI();
            initBackgroundWorker();
        }

        /* 🚀 BACKGROUND WORKER INITIALIZATION */
        function initBackgroundWorker() {
            // This blob converts standard text into a safe, background thread asset.
            const workerCode = `
                setInterval(() => {
                    postMessage('tick');
                }, 100);
            `;
            const blob = new Blob([workerCode], { type: 'application/javascript' });
            const worker = new Worker(URL.createObjectURL(blob));

            // Listen to background worker ticking events (works when tab is hidden!)
            worker.onmessage = function(e) {
                if (e.data === 'tick') {
                    gameData.sodas += (gameData.sodasPerSecond / 10);
                    updateUI();
                }
            };

            // Automated Local Save back-up loop (10 seconds)
            setInterval(() => {
                saveGame(true);
            }, 10000);
        }

        /* ☁️ CLOUD SYNC SYSTEM (Saves data instantly to an open API based on custom username) */
        async function cloudSave() {
            const username = document.getElementById('cloud-username').value.trim();
            if (!username) {
                alert("Please enter a custom profile name to sync your cloud profile!");
                return;
            }

            const saveData = {
                sodas: gameData.sodas,
                totalSodasClicked: gameData.totalSodasClicked,
                examPoints: gameData.examPoints,
                upgradesState: upgrades.map(up => ({ id: up.id, count: up.count, cost: up.cost }))
            };

            showStatus("Saving to cloud...");
            try {
                // Using kvdb.io (a free cloud key-value store for prototyping games)
                const response = await fetch(`https://kvdb.io/MNm6u38i5W8E6T1Zg6y7P1/${username}`, {
                    method: 'POST',
                    body: JSON.stringify(saveData)
                });
                if(response.ok) {
                    localStorage.setItem('miku_cloud_user', username);
                    showStatus("Cloud Synced Successfully!");
                } else {
                    alert("Cloud Sync failed. Try a different user profile name.");
                }
            } catch (err) {
                alert("Network error trying to connect to cloud storage provider.");
            }
        }

        async function cloudLoad() {
            const username = document.getElementById('cloud-username').value.trim();
            if (!username) {
                alert("Please type your profile name to pull down data!");
                return;
            }

            showStatus("Fetching cloud save...");
            try {
                const response = await fetch(`https://kvdb.io/MNm6u38i5W8E6T1Zg6y7P1/${username}`);
                if (!response.ok) {
                    alert("No cloud profile data found for that name.");
                    return;
                }
                const parsedData = await response.json();
                
                gameData.sodas = parsedData.sodas || 0;
                gameData.totalSodasClicked = parsedData.totalSodasClicked || 0;
                gameData.examPoints = parsedData.examPoints || 0;
                
                if (parsedData.upgradesState) {
                    parsedData.upgradesState.forEach(savedUp => {
                        const originalUpgrade = upgrades.find(up => up.id === savedUp.id);
                        if (originalUpgrade) {
                            originalUpgrade.count = savedUp.count || 0;
                            originalUpgrade.cost = savedUp.cost || originalUpgrade.baseCost;
                        }
                    });
                }
                localStorage.setItem('miku_cloud_user', username);
                recalculateSPS();
                renderShop();
                updateUI();
                showStatus("Loaded Cloud Save!");
            } catch (err) {
                alert("Error connecting to server data pipelines.");
            }
        }

        function showStatus(text) {
            saveStatusEl.textContent = text;
            saveStatusEl.style.opacity = '1';
            setTimeout(() => { saveStatusEl.style.opacity = '0'; }, 2500);
        }

        function renderShop() {
            shopContainer.innerHTML = '';
            upgrades.forEach((upgrade, index) => {
                const itemDiv = document.createElement('div');
                itemDiv.className = 'shop-item disabled';
                itemDiv.id = `upgrade-${upgrade.id}`;
                itemDiv.onclick = () => buyUpgrade(index);
        
                const iconContent = upgrade.image ? '' : upgrade.icon;
                let inlineStyle = '';
                if (upgrade.image) {
                    const size = upgrade.zoom ? upgrade.zoom : 'cover';
                    const pos = upgrade.position ? upgrade.position : 'center';
                    inlineStyle = `style="background-image: url('${upgrade.image}'); background-size: ${size}; background-position: ${pos};"`;
                }
        
                itemDiv.innerHTML = `
                    <div class="item-icon" id="icon-${upgrade.id}" ${inlineStyle}>${iconContent}</div>
                    <div class="item-details">
                        <div class="item-name">${upgrade.name}</div>
                        <div class="item-effect">+${upgrade.sps} Sodas/sec</div>
                        <div class="item-cost">Cost: <span id="cost-${upgrade.id}">${Math.floor(upgrade.cost)}</span></div>
                    </div>
                    <div class="item-count" id="count-${upgrade.id}">0</div>
                `;
                shopContainer.appendChild(itemDiv);
            });
        }

        function updateUI() {
            sodaCountEl.textContent = `${Math.floor(gameData.sodas)} Matcha${Math.floor(gameData.sodas) === 1 ? '' : 's'}`;
            spsCountEl.textContent = `${gameData.sodasPerSecond.toFixed(1)} per second`;
            epCountEl.textContent = `Exam Points: ${gameData.examPoints} (+${gameData.examPoints * 10}% Boost, +${gameData.examPoints} Click)`;

            upgrades.forEach(upgrade => {
                const itemDiv = document.getElementById(`upgrade-${upgrade.id}`);
                const costEl = document.getElementById(`cost-${upgrade.id}`);
                const countEl = document.getElementById(`count-${upgrade.id}`);
                
                if(costEl) costEl.textContent = Math.floor(upgrade.cost);
                if(countEl) countEl.textContent = upgrade.count;

                if (itemDiv) {
                    if (gameData.sodas >= upgrade.cost) {
                        itemDiv.classList.remove('disabled');
                    } else {
                        itemDiv.classList.add('disabled');
                    }
                }
            });

            const claimableEP = Math.floor(gameData.sodas / 25000);
            if (claimableEP >= 1) {
                prestigeBtn.classList.remove('disabled');
                prestigeBtn.textContent = `Take Exam (Pass to gain +${claimableEP} Exam Points!)`;
            } else {
                prestigeBtn.classList.add('disabled');
                prestigeBtn.textContent = `Take Exam (Requires 25,000 Matchas)`;
            }
        }

        mikuBtn.addEventListener('click', (e) => {
            const clickValue = 1 + gameData.examPoints;
            gameData.sodas += clickValue;
            gameData.totalSodasClicked += clickValue;
            createFloatingText(e.clientX, e.clientY, `+${clickValue}`);
            updateUI();
        });

        function createFloatingText(x, y, text) {
            const el = document.createElement('div');
            el.className = 'floating-text';
            el.style.left = `${x}px`;
            el.style.top = `${y}px`;
            el.textContent = text;
            clickArea.appendChild(el);
            el.addEventListener('animationend', () => el.remove());
        }

        function buyUpgrade(index) {
            const upgrade = upgrades[index];
            if (gameData.sodas >= upgrade.cost) {
                gameData.sodas -= upgrade.cost;
                upgrade.count++;
                upgrade.cost = upgrade.cost * 1.15;
                recalculateSPS();
                updateUI();
                saveGame(true); 
            }
        }

        function recalculateSPS() {
            let totalSPS = 0;
            upgrades.forEach(up => totalSPS += up.count * up.sps);
            gameData.sodasPerSecond = totalSPS * (1 + (gameData.examPoints * 0.1));
        }

        function prestigeGame() {
            const pointsToGain = Math.floor(gameData.sodas / 25000);
            if (pointsToGain < 1) return;

            if (confirm(`Are you ready to help Miku pass her exams? This will reset your Matchas, but you will permanently gain ${pointsToGain} Exam Points!`)) {
                gameData.examPoints += pointsToGain;
                gameData.sodas = 0;
                gameData.sodasPerSecond = 0;

                upgrades.forEach(up => {
                    up.count = 0;
                    up.cost = up.baseCost;
                });

                recalculateSPS();
                renderShop();
                updateUI();
                saveGame(true);
            }
        }

        function saveGame(isSilent = false) {
            const saveData = {
                sodas: gameData.sodas,
                totalSodasClicked: gameData.totalSodasClicked,
                examPoints: gameData.examPoints,
                upgradesState: upgrades.map(up => ({ id: up.id, count: up.count, cost: up.cost }))
            };
            localStorage.setItem('mikuClicker_save', JSON.stringify(saveData));
            if (isSilent) showStatus("Progress Saved!");
        }

        function loadGame() {
            const savedUser = localStorage.getItem('miku_cloud_user');
            if(savedUser) document.getElementById('cloud-username').value = savedUser;

            const rawSave = localStorage.getItem('mikuClicker_save');
            if (!rawSave) return; 
            try {
                const parsedData = JSON.parse(rawSave);
                gameData.sodas = parsedData.sodas || 0;
                gameData.totalSodasClicked = parsedData.totalSodasClicked || 0;
                gameData.examPoints = parsedData.examPoints || 0;
                
                if (parsedData.upgradesState) {
                    parsedData.upgradesState.forEach(savedUp => {
                        const originalUpgrade = upgrades.find(up => up.id === savedUp.id);
                        if (originalUpgrade) {
                            originalUpgrade.count = savedUp.count || 0;
                            originalUpgrade.cost = savedUp.cost || originalUpgrade.baseCost;
                        }
                    });
                }
                recalculateSPS();
            } catch (err) {}
        }

        function resetGame() {
            if (confirm("Wipe all progress?")) {
                localStorage.removeItem('mikuClicker_save');
                localStorage.removeItem('miku_cloud_user');
                location.reload();
            }
        }

        init();
    </script>
</body>
</html>
